<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHRONOCRUSH</title>
  <link rel="stylesheet" href="core-engine/style.css">
</head>
<body>

  <div id="authScreen" class="full-screen-view active">
    <div class="auth-card">
      <h1 class="game-brand-title">CHRONOCRUSH</h1>
      <p class="game-brand-tagline">The Era Odyssey</p>
      
      <div class="auth-action-group">
        <button class="btn btn-primary" onclick="handleAuth('email')">Sign In with Email</button>
        <button class="btn btn-secondary" onclick="handleAuth('guest')">Play as Guest</button>
      </div>
    </div>
  </div>

  <div id="homePage" class="full-screen-view">
    <header class="app-status-bar">
      <button class="icon-btn" id="settingsBtn" onclick="toggleSettings(true)">⚙️</button>
      
      <div class="status-indicator-pill lives-pill">
        <span class="pill-icon">❤️</span>
        <span id="livesCounter">5</span>
      </div>
      
      <div class="status-indicator-pill gold-pill">
        <span class="pill-icon">🪙</span>
        <span id="profileGold">150</span>
      </div>
    </header>

    <main class="map-scroll-viewport">
      <div class="zig-zag-map" id="mapLayer">
        </div>
    </main>
  </div>

  <div id="gamePlayScreen" class="full-screen-view">
    <header class="gameplay-header">
      <button class="btn-back" onclick="exitToHome()">◀ Leave</button>
      <div class="current-era-title" id="activeEraName">1940s Noir</div>
    </header>

    <div class="gameplay-core-layout">
      <div class="gameplay-stats-panel">
        <div class="mini-stat-card">
          <p>MOVES</p>
          <span id="movesDisplay">22</span>
        </div>
        <div class="mini-stat-card">
          <p>TARGET</p>
          <span id="targetDisplay">500</span>
        </div>
        <div class="mini-stat-card">
          <p>SCORE</p>
          <span id="scoreDisplay">0</span>
        </div>
      </div>

      <div class="canvas-board-wrapper">
        <canvas id="gameCanvas" width="320" height="480"></canvas>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal-overlay">
    <div class="modal-window">
      <h2>SETTINGS</h2>
      <hr class="modal-divider">
      <button class="menu-action-btn" onclick="resetGameProgress()">Reset Progress</button>
      <button class="menu-action-btn" onclick="handleSignOut()">Sign Out</button>
      <button class="menu-action-btn close" onclick="toggleSettings(false)">Close Menu</button>
    </div>
  </div>

  <div id="portalFlash"></div>

  <script src="core-engine/logic.js"></script>
</body>
</html>
