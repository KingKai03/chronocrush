<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChronoCrush: The Era Odyssey</title>
<style>
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

:root {
  --gold: #d4af37;
  --gold-dim: #a08020;
  --dark-bg: #12100e;
  --panel-bg: #1c1712;
  --panel-border: #3a2f20;
  --surface: #241e16;
  --surface-hover: #2e2618;
  --text-primary: #f0e6d2;
  --text-muted: #8a7a60;
  --text-dim: #5a4a35;
  --red: #c0392b;
  --green: #27ae60;
  --blue: #2471a3;
  --purple: #7d3c98;
}

html, body { height: 100%; }

body {
  background-color: var(--dark-bg);
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(212,175,55,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 90%, rgba(100,60,20,0.06) 0%, transparent 60%);
  color: var(--text-primary);
  font-family: 'Georgia', 'Times New Roman', serif;
  min-height: 100vh;
  padding: 12px 16px 32px;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────────────── */
.game-header {
  text-align: center;
  margin-bottom: 18px;
}
.game-header h1 {
  font-size: clamp(22px, 5vw, 36px);
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  line-height: 1.1;
  text-shadow: 0 0 30px rgba(212,175,55,0.3);
}
.game-header .sub {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 3px;
  font-style: italic;
  margin-top: 3px;
  font-family: sans-serif;
}

/* ── LAYOUT ─────────────────────────────────────────── */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  max-width: 920px;
  margin: 0 auto;
}

@media (max-width: 700px) {
  .main-layout { grid-template-columns: 1fr; }
}

/* ── PANEL ───────────────────────────────────────────── */
.panel {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  overflow: hidden;
}
.panel-header {
  background: linear-gradient(135deg, #1e1810 0%, #2a2016 100%);
  border-bottom: 1px solid var(--panel-border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.panel-title {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--gold);
  text-transform: uppercase;
  font-family: sans-serif;
  font-weight: bold;
}
.era-badge {
  font-size: 11px;
  background: rgba(212,175,55,0.15);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 2px 10px;
  border-radius: 20px;
  font-family: sans-serif;
  white-space: nowrap;
}

/* ── HUD STATS ───────────────────────────────────────── */
.hud-bar {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: #0e0c09;
  border-bottom: 1px solid var(--panel-border);
}
.hud-stat {
  padding: 10px 8px;
  text-align: center;
  border-right: 1px solid var(--panel-border);
}
.hud-stat:last-child { border-right: none; }
.hud-label {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  font-family: sans-serif;
  text-transform: uppercase;
  display: block;
  margin-bottom: 2px;
}
.hud-value {
  font-size: 22px;
  font-weight: bold;
  color: var(--text-primary);
  font-family: sans-serif;
  line-height: 1;
}
.hud-value.gold { color: var(--gold); }

/* ── CANVAS ──────────────────────────────────────────── */
.canvas-wrap {
  padding: 12px;
  display: flex;
  justify-content: center;
}
#gameCanvas {
  display: block;
  border-radius: 6px;
  border: 2px solid var(--panel-border);
  cursor: pointer;
  transition: border-color 0.4s;
}

/* ── AVATAR PANEL ────────────────────────────────────── */
.avatar-stage {
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  background:
    radial-gradient(ellipse 80% 60% at 50% 80%, rgba(100,60,10,0.18) 0%, transparent 70%),
    var(--surface);
  border-bottom: 1px solid var(--panel-border);
  position: relative;
  min-height: 280px;
  justify-content: center;
}
.mood-bubble {
  position: absolute;
  top: 10px;
  right: 12px;
  background: var(--gold);
  color: #1a1200;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1.5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: sans-serif;
  text-transform: uppercase;
}

/* SVG avatar container */
#avatarSVG {
  width: 140px;
  height: 260px;
  overflow: visible;
}

@keyframes breathe {
  0%, 100% { transform: translateY(0) scaleY(1); }
  50% { transform: translateY(-3px) scaleY(1.015); }
}
@keyframes jump {
  0% { transform: translateY(0); }
  30% { transform: translateY(-18px); }
  60% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}
@keyframes warpIn {
  0% { transform: scaleY(0) scaleX(1.5); opacity: 0; }
  100% { transform: scaleY(1) scaleX(1); opacity: 1; }
}
@keyframes fadeFlash {
  0% { opacity: 1; }
  50% { opacity: 0.1; }
  100% { opacity: 1; }
}
#avatarSVG.breathing { animation: breathe 3.5s ease-in-out infinite; }
#avatarSVG.jumping { animation: jump 0.5s ease-out; }
#avatarSVG.warping { animation: warpIn 0.5s ease-out; }

/* Portal flash overlay */
#portalFlash {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(212,175,55,0.7) 0%, transparent 70%);
  opacity: 0;
  pointer-events: none;
  border-radius: 8px;
  transition: opacity 0.2s;
}
#portalFlash.active { animation: fadeFlash 0.6s ease-out; }

/* ── DRESSING ROOM ───────────────────────────────────── */
.dressing-room {
  padding: 14px 16px;
  overflow-y: auto;
  max-height: 420px;
}
.dr-section-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  font-family: sans-serif;
  font-weight: bold;
  margin: 10px 0 6px;
}
.chip-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.chip-btn {
  background: var(--surface);
  color: var(--text-primary);
  border: 1px solid var(--panel-border);
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  font-family: sans-serif;
  transition: all 0.15s;
  min-height: 34px;
}
.chip-btn:hover { border-color: var(--gold); background: var(--surface-hover); }
.chip-btn.active { border-color: var(--gold); background: rgba(212,175,55,0.15); color: var(--gold); }

.outfit-btn {
  width: 100%;
  text-align: left;
  background: var(--surface);
  color: var(--text-primary);
  border: 1px solid var(--panel-border);
  padding: 9px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: sans-serif;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.outfit-btn:hover:not(:disabled) { border-color: var(--gold); background: var(--surface-hover); }
.outfit-btn:disabled {
  color: var(--text-dim);
  cursor: not-allowed;
  opacity: 0.55;
}
.outfit-btn .lock-icon { font-size: 14px; }
.outfit-btn .outfit-name { flex: 1; }
.outfit-btn .outfit-era { font-size: 10px; color: var(--text-dim); margin-left: auto; letter-spacing: 0.5px; }

/* ── GAME OVER / WIN SCREENS ─────────────────────────── */
#overlayScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,8,5,0.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#overlayScreen.visible { display: flex; }
.overlay-box {
  background: var(--panel-bg);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 32px 40px;
  text-align: center;
  max-width: 340px;
  width: 90%;
}
.overlay-title {
  font-size: 26px;
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.overlay-body {
  font-size: 14px;
  color: var(--text-muted);
  font-family: sans-serif;
  line-height: 1.6;
  margin-bottom: 20px;
}
.overlay-btn {
  background: var(--gold);
  color: #0e0c09;
  border: none;
  padding: 12px 28px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  font-family: sans-serif;
  letter-spacing: 1px;
  transition: opacity 0.15s;
}
.overlay-btn:hover { opacity: 0.85; }

/* ── ERA PROGRESS ────────────────────────────────────── */
.era-progress {
  display: flex;
  gap: 4px;
  padding: 10px 16px;
  background: #0e0c09;
  border-top: 1px solid var(--panel-border);
}
.era-pip {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--panel-border);
  transition: background 0.4s;
}
.era-pip.done { background: var(--gold); }
.era-pip.active { background: rgba(212,175,55,0.5); }
</style>
</head>
<body>

<div class="game-header">
  <h1>ChronoCrush</h1>
  <div class="sub">The Era Odyssey</div>
</div>

<div class="main-layout">

  <!-- LEFT PANEL: Game Board -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">&#9719; Time Grid</span>
      <span class="era-badge" id="eraBadge">1940s Noir</span>
    </div>
    <div class="hud-bar">
      <div class="hud-stat">
        <span class="hud-label">Moves</span>
        <span class="hud-value" id="movesText">20</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">Target</span>
        <span class="hud-value gold" id="targetText">500</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">Score</span>
        <span class="hud-value gold" id="scoreText">0</span>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <div class="era-progress">
      <div class="era-pip active" id="pip0"></div>
      <div class="era-pip" id="pip1"></div>
      <div class="era-pip" id="pip2"></div>
      <div class="era-pip" id="pip3"></div>
    </div>
  </div>

  <!-- RIGHT PANEL: Avatar + Dressing Room -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">&#9997; Chrono-Lab</span>
      <span class="panel-title" id="avatarNameTag" style="color:var(--text-muted); letter-spacing:1px; font-weight:normal;">Time Traveler</span>
    </div>

    <!-- Avatar Stage -->
    <div class="avatar-stage">
      <div class="mood-bubble" id="moodBubble">READY</div>
      <div id="portalFlash"></div>

      <!-- Full-body SVG Avatar -->
      <svg id="avatarSVG" class="breathing" viewBox="0 0 140 260" xmlns="http://www.w3.org/2000/svg" aria-label="Your time traveler avatar">

        <!-- SHADOW -->
        <ellipse cx="70" cy="252" rx="32" ry="6" fill="rgba(0,0,0,0.35)" />

        <!-- LEGS -->
        <g id="svgLegs">
          <rect x="44" y="168" width="22" height="60" rx="8" fill="#3a4a5c" id="legL"/>
          <rect x="74" y="168" width="22" height="60" rx="8" fill="#3a4a5c" id="legR"/>
          <!-- Shoes -->
          <ellipse cx="55" cy="230" rx="14" ry="7" fill="#1a1a1a" id="shoeL"/>
          <ellipse cx="85" cy="230" rx="14" ry="7" fill="#1a1a1a" id="shoeR"/>
        </g>

        <!-- TORSO / OUTFIT -->
        <g id="svgTorso">
          <rect x="38" y="108" width="64" height="68" rx="10" fill="#4a5568" id="shirtBody"/>
          <!-- Collar -->
          <polygon points="70,108 58,122 70,118 82,122" fill="#6b7280" id="shirtCollar"/>
          <!-- Arms -->
          <rect x="18" y="110" width="22" height="50" rx="8" fill="#4a5568" id="armL"/>
          <rect x="100" y="110" width="22" height="50" rx="8" fill="#4a5568" id="armR"/>
          <!-- Hands -->
          <circle cx="29" cy="163" r="9" fill="#c8a882" id="handL"/>
          <circle cx="111" cy="163" r="9" fill="#c8a882" id="handR"/>
        </g>

        <!-- NECK -->
        <rect x="61" y="94" width="18" height="18" rx="6" fill="#c8a882" id="svgNeck"/>

        <!-- HEAD -->
        <g id="svgHead">
          <!-- Skull -->
          <ellipse cx="70" cy="76" rx="30" ry="34" fill="#c8a882" id="faceBase"/>
          <!-- Ear L -->
          <ellipse cx="40" cy="78" rx="6" ry="9" fill="#c8a882"/>
          <!-- Ear R -->
          <ellipse cx="100" cy="78" rx="6" ry="9" fill="#c8a882"/>

          <!-- Eyes -->
          <ellipse cx="60" cy="72" rx="5" ry="6" fill="white" id="eyeWhiteL"/>
          <ellipse cx="80" cy="72" rx="5" ry="6" fill="white" id="eyeWhiteR"/>
          <circle cx="60" cy="73" r="3" fill="#3a2510" id="pupilL"/>
          <circle cx="80" cy="73" r="3" fill="#3a2510" id="pupilR"/>
          <!-- Eye shine -->
          <circle cx="61.5" cy="71.5" r="1" fill="white"/>
          <circle cx="81.5" cy="71.5" r="1" fill="white"/>
          <!-- Eyebrows -->
          <path d="M54,65 Q60,62 66,65" stroke="#3a2510" stroke-width="2" fill="none" stroke-linecap="round" id="browL"/>
          <path d="M74,65 Q80,62 86,65" stroke="#3a2510" stroke-width="2" fill="none" stroke-linecap="round" id="browR"/>

          <!-- Nose -->
          <path d="M68,78 Q70,84 72,78" stroke="#b8967a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- Nostrils -->
          <circle cx="67" cy="82" r="1.5" fill="#b8967a"/>
          <circle cx="73" cy="82" r="1.5" fill="#b8967a"/>

          <!-- Mouth - neutral -->
          <path d="M63,90 Q70,95 77,90" stroke="#8a5a40" stroke-width="2" fill="none" stroke-linecap="round" id="mouthPath"/>
          <!-- Lips -->
          <path d="M63,90 Q70,93 77,90" stroke="#c07050" stroke-width="1" fill="rgba(192,112,80,0.3)" stroke-linecap="round"/>
        </g>

        <!-- HAIR (drawn last so it sits on top of head) -->
        <g id="svgHair">
          <!-- Default: dark medium hair -->
          <ellipse cx="70" cy="52" rx="30" ry="22" fill="#2a1a0a" id="hairTop"/>
          <rect x="40" y="48" width="9" height="26" rx="4" fill="#2a1a0a" id="hairSideL"/>
          <rect x="91" y="48" width="9" height="26" rx="4" fill="#2a1a0a" id="hairSideR"/>
        </g>

        <!-- OUTFIT OVERLAY (era-specific pieces rendered over base) -->
        <g id="svgOutfitOverlay"></g>

        <!-- ACCESSORY OVERLAY -->
        <g id="svgAccessory"></g>

      </svg>
    </div>

    <!-- Dressing Room -->
    <div class="dressing-room">

      <div class="dr-section-label">Base Identity</div>
      <div class="chip-row" id="identityBtns">
        <button class="chip-btn" onclick="setIdentity('male',this)">Male</button>
        <button class="chip-btn active" onclick="setIdentity('neutral',this)">Androgynous</button>
        <button class="chip-btn" onclick="setIdentity('female',this)">Female</button>
      </div>

      <div class="dr-section-label">Skin Tone</div>
      <div class="chip-row" id="skinBtns">
        <button class="chip-btn" onclick="setSkin('#f5d5b0',this)" style="background:#f5d5b0; color:#333; border-color:#e0b88a;">&#9679;</button>
        <button class="chip-btn active" onclick="setSkin('#c8a882',this)" style="background:#c8a882; color:#333; border-color:#a08050;">&#9679;</button>
        <button class="chip-btn" onclick="setSkin('#a0734d',this)" style="background:#a0734d; color:#fff; border-color:#80533d;">&#9679;</button>
        <button class="chip-btn" onclick="setSkin('#6b3d28',this)" style="background:#6b3d28; color:#fff; border-color:#4a2818;">&#9679;</button>
        <button class="chip-btn" onclick="setSkin('#3a1f10',this)" style="background:#3a1f10; color:#fff; border-color:#2a1008;">&#9679;</button>
      </div>

      <div class="dr-section-label">Hair Style</div>
      <div class="chip-row" id="hairBtns">
        <button class="chip-btn active" onclick="setHair('default',this)">Dark</button>
        <button class="chip-btn" onclick="setHair('blonde',this)">Blonde</button>
        <button class="chip-btn" onclick="setHair('red',this)">Red</button>
        <button class="chip-btn" onclick="setHair('afro',this)">Afro</button>
        <button class="chip-btn" onclick="setHair('bun',this)">Bun</button>
        <button class="chip-btn" onclick="setHair('bald',this)">Bald</button>
      </div>

      <div class="dr-section-label">Outfits &amp; Era Rewards</div>
      <button class="outfit-btn active" id="btn_base" onclick="setOutfit('base')">
        <span class="lock-icon">&#128155;</span>
        <span class="outfit-name">Modern Traveler Suit</span>
        <span class="outfit-era">2026</span>
      </button>
      <button class="outfit-btn" id="btn_coat" disabled onclick="setOutfit('coat')">
        <span class="lock-icon" id="lock_coat">&#128274;</span>
        <span class="outfit-name">Detective Trench Coat</span>
        <span class="outfit-era">1940s</span>
      </button>
      <button class="outfit-btn" id="btn_jacket" disabled onclick="setOutfit('jacket')">
        <span class="lock-icon" id="lock_jacket">&#128274;</span>
        <span class="outfit-name">Greaser Leather Jacket</span>
        <span class="outfit-era">1950s</span>
      </button>
      <button class="outfit-btn" id="btn_vest" disabled onclick="setOutfit('vest')">
        <span class="lock-icon" id="lock_vest">&#128274;</span>
        <span class="outfit-name">Psychedelic Fringe Vest</span>
        <span class="outfit-era">1960s</span>
      </button>
      <button class="outfit-btn" id="btn_jumpsuit" disabled onclick="setOutfit('jumpsuit')">
        <span class="lock-icon" id="lock_jumpsuit">&#128274;</span>
        <span class="outfit-name">Studio-54 Jumpsuit</span>
        <span class="outfit-era">1970s</span>
      </button>

    </div>
  </div>
</div>

<!-- Overlay (win / lose) -->
<div id="overlayScreen">
  <div class="overlay-box">
    <div class="overlay-title" id="overlayTitle">Timeline Collapsed!</div>
    <div class="overlay-body" id="overlayBody">The timeline unraveled. Regroup and try again.</div>
    <button class="overlay-btn" onclick="dismissOverlay()">Try Again</button>
  </div>
</div>

<script src="core-engine/logic.js" defer></script>
</body>
</html>
