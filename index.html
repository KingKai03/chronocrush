<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoCrush: The Era Odyssey</title>
    <style>
        /* Flash animation for time traveling warp effect */
        @keyframes warpFlash {
            0% { background-color: #fff; opacity: 1; }
            50% { background-color: #d4af37; opacity: 0.8; }
            100% { background-color: #1a1a1a; opacity: 0; }
        }
        .warp-active {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999;
            pointer-events: none;
            animation: warpFlash 0.8s ease-out forwards;
        }
        /* Screen shake effect */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
        .shake-active {
            animation: shake 0.5s infinite;
        }
    </style>
</head>
<body id="mainBody" style="background-color: #1a1a1a; color: #f0e6d2; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; transition: background 0.5s;">

    <div id="warpOverlay"></div>

    <h1 style="color: #d4af37; letter-spacing: 2px; margin-bottom: 5px;">ChronoCrush</h1>
    <h3 style="color: #a09080; margin-top: 0; font-weight: 300; margin-bottom: 20px;">The Era Odyssey</h3>

    <div id="mainLayout" style="display: flex; justify-content: center; align-items: flex-start; gap: 30px; max-width: 950px; margin: 0 auto; flex-wrap: wrap;">
        
        <div id="gamePanel" style="max-width: 420px; width: 100%;">
            <p id="currentEraText" style="font-style: italic; color: #8a7a6a; margin-bottom: 10px; font-weight: bold; font-size: 18px;">Current Era: 1940s Noir</p>
            
            <div style="display: flex; justify-content: space-between; background-color: #2b2520; border: 2px solid #4a3c31; padding: 10px 20px; margin-bottom: 15px; border-radius: 5px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
                <div><span style="color: #a09080;">MOVES:</span> <strong id="movesText" style="color: #fff; font-size: 20px;">20</strong></div>
                <div><span style="color: #a09080;">TARGET:</span> <strong id="targetText" style="color: #d4af37; font-size: 20px;">500</strong></div>
                <div><span style="color: #a09080;">SCORE:</span> <strong id="scoreText" style="color: #d4af37; font-size: 20px;">0</strong></div>
            </div>

            <canvas id="gameCanvas" width="400" height="400" style="border: 4px solid #4a3c31; background-color: #2b2520; box-shadow: 0px 10px 25px rgba(0,0,0,0.7); display: block; margin: 0 auto; border-radius: 4px; transition: all 0.5s;"></canvas>
        </div>

        <div id="labPanel" style="max-width: 420px; width: 100%; background-color: #221c17; border: 2px solid #d4af37; border-radius: 8px; padding: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.5); box-sizing: border-box;">
            
            <div style="background: radial-gradient(circle, #3a3025 0%, #1a1511 100%); border: 2px dashed #a09080; border-radius: 6px; padding: 15px; position: relative; margin-bottom: 20px; min-height: 160px;">
                <div id="avatarMoodBubble" style="position: absolute; top: 10px; right: 10px; background-color: #d4af37; color: #1a1a1a; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Ready!</div>
                
                <div id="avatarContainer" style="font-size: 65px; line-height: 1.1; margin-top: 15px; user-select: none; transition: transform 0.2s ease;">
                    <div id="layerHair" style="margin-bottom: -35px; position: relative; z-index: 3;">🧑‍🦱</div>
                    <div id="layerFace" style="margin-bottom: -15px; position: relative; z-index: 2;">🙂</div>
                    <div id="layerOutfit" style="position: relative; z-index: 1;">👕</div>
                </div>
                <p style="font-size: 13px; color: #a09080; margin-top: 10px; margin-bottom: 0;">Time Odyssey Companion</p>
            </div>

            <h3 style="color: #d4af37; margin-top: 0; margin-bottom: 15px; letter-spacing: 1px; font-size: 16px; border-bottom: 1px solid #4a3c31; padding-bottom: 5px;">🧬 CHRONO-LAB STYLING BAY</h3>
            
            <div style="margin-bottom: 12px; text-align: left;">
                <label style="font-size: 12px; color: #a09080; display: block; margin-bottom: 4px;">CHOOSE HAIR / STYLE:</label>
                <div style="display: flex; gap: 8px;">
                    <button onclick="changeHair('🧑‍🦱')" style="background-color: #3a3025; color: #fff; border: 1px solid #5a4a3a; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Curly</button>
                    <button onclick="changeHair('👱')" style="background-color: #3a3025; color: #fff; border: 1px solid #5a4a3a; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Blonde</button>
                    <button onclick="changeHair('🧑‍🦰')" style="background-color: #3a3025; color: #fff; border: 1px solid #5a4a3a; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Redhead</button>
                    <button onclick="changeHair('🎩')" style="background-color: #3a3025; color: #fff; border: 1px solid #5a4a3a; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Fedora</button>
                </div>
            </div>

            <div style="text-align: left; margin-top: 15px;">
                <label style="font-size: 12px; color: #a09080; display: block; margin-bottom: 6px;">EQUIP OUTFITS & TIME REWARDS:</label>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <button onclick="changeOutfit('👕')" style="background-color: #4a3c31; color: #fff; border: 1px solid #d4af37; padding: 8px; border-radius: 4px; cursor: pointer; text-align: left;">
                        🧍 Standard Time Suit
                    </button>
                    <button id="coatBtn" onclick="changeOutfit('🕵️‍♂️🧥')" disabled style="background-color: #332a22; color: #665544; border: 1px solid #44372c; padding: 8px; border-radius: 4px; cursor: not-allowed; text-align: left; transition: all 0.3s;">
                        🔒 '40s Detective Trench Coat
                    </button>
                    <button id="jacketBtn" onclick="changeOutfit('🧥⚡')" disabled style="background-color: #332a22; color: #665544; border: 1px solid #44372c; padding: 8px; border-radius: 4px; cursor: not-allowed; text-align: left; transition: all 0.3s;">
                        🔒 '50s Greaser Leather Jacket
                    </button>
                    <button id="vestBtn" onclick="changeOutfit('🎽🌸')" disabled style="background-color: #332a22; color: #665544; border: 1px solid #44372c; padding: 8px; border-radius: 4px; cursor: not-allowed; text-align: left; transition: all 0.3s;">
                        🔒 '60s Hippie Fringe Vest
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="core-engine/logic.js"></script>
</body>
</html>
