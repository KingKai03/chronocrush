<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChronoCrush: The Era Odyssey</title>
    <style>
        /* CSS RESET FOR MOBILE VIEWPORT STABILITY */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #1a1a1a; color: #f0e6d2; font-family: sans-serif;
            margin: 0; padding: 10px; text-align: center; overflow-x: hidden;
        }

        /* RESPONSIVE FLEX CONTAINER */
        #mainLayout {
            display: flex; justify-content: center; align-items: flex-start;
            gap: 20px; max-width: 1000px; margin: 0 auto; flex-wrap: wrap;
        }

        .panel { max-width: 420px; width: 100%; }

        /* ADVANCED FULL-BODY AVATAR GRAPHICS CONTAINER */
        #avatarContainer {
            position: relative; width: 160px; height: 260px; margin: 15px auto;
            transform-origin: bottom center; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* IDLE BREATHING ANIMATION (PHYSICAL MOVEMENT) */
        @keyframes avatarBreath {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(1.02) scaleX(0.99) translateY(-2px); }
            100% { transform: scaleY(1); }
        }
        .breathing { animation: avatarBreath 3s ease-in-out infinite; }

        /* MATCH HOP JUMP */
        @keyframes popJump {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-25px) scale(1.05); }
            70% { transform: translateY(5px) scale(0.95); }
            100% { transform: translateY(0) scale(1); }
        }
        .jump-active { animation: popJump 0.45s ease-out; }

        /* MODULAR LAYER PILE-UP STACK */
        .avatar-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center bottom;
            display: flex; justify-content: center; align-items: center; font-size: 14px;
        }

        /* PHYSICAL REPRESENTATION PLACEHOLDERS IN ABSENCE OF PNG FILES */
        #layerBody { background-color: rgba(212, 175, 55, 0.15); border-radius: 30px 30px 10px 10px; border: 1px dashed #d4af37; }
        #layerFace { font-size: 40px; align-items: flex-start; padding-top: 35px; }
        #layerHair { font-size: 50px; align-items: flex-start; padding-top: 5px; z-index: 5; }
        #layerOutfit { font-size: 60px; align-items: center; padding-top: 60px; }

        /* SELECTION INTERACTIVE UI CHIPS */
        .chip-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .style-btn {
            background-color: #3a3025; color: #fff; border: 1px solid #5a4a3a;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; min-height: 38px;
        }
        .style-btn:active { background-color: #d4af37; color: #1a1a1a; }
        
        .outfit-row {
            background-color: #332a22; color: #665544; border: 1px solid #44372c;
            padding: 10px; border-radius: 6px; text-align: left; margin-bottom: 6px;
            font-size: 13px; width: 100%; display: block;
        }

        /* BLACK HOLE COSMIC PORTAL EFFECTS */
        #warpOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999;
            pointer-events: none; opacity: 0; background-color: #0b132b;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 350px 350px; transition: opacity 0.4s ease;
        }
        #blackHole {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: radial-gradient(circle, #000 60%, #7209b7 100%); border-radius: 50%;
            transform: translate(-50%, -50%) scale(0); transition: transform 0.5s ease; z-index: 10000; pointer-events: none;
        }
        .portal-active #warpOverlay { opacity: 1; }
        .portal-active #blackHole { transform: translate(-50%, -50%) scale(80); }

        @keyframes implode { 100% { transform: scale(0) rotate(540deg); filter: blur(5px); } }
        @keyframes explode { 0% { transform: scale(0) rotate(-540deg); filter: blur(5px); } 100% { transform: scale(1) rotate(0deg); filter: blur(0px); } }
        .implode-active { animation: implode 0.5s ease-in forwards; }
        .explode-active { animation: explode 0.5s ease-out forwards; }

        /* SCREEN SMARTPHONE SCREEN MEDIA QUERY OVERRIDES */
        @media (max-width: 768px) {
            body { padding: 5px; }
            h1 { font-size: 24px; margin-bottom: 2px; }
            h3 { font-size: 14px; margin-bottom: 12px; }
            #mainLayout { flex-direction: column; align-items: center; gap: 15px; }
            #gameCanvas { width: 92vw; height: 92vw; max-width: 360px; max-height: 360px; }
            .style-btn { padding: 10px 14px; font-size: 13px; } /* Larger touch targets */
        }
    </style>
</head>
<body>

    <div id="warpOverlay"></div>
    <div id="blackHole"></div>

    <h1>ChronoCrush</h1>
    <h3 style="color: #a09080; font-weight: 300;">The Era Odyssey</h3>

    <div id="mainLayout">
        
        <!-- CANVAS DISPLAY -->
        <div class="panel">
            <p id="currentEraText" style="font-style: italic; color: #8a7a6a; margin: 5px 0; font-weight: bold;">Current Era: 1940s Noir</p>
            <div style="display: flex; justify-content: space-between; background-color: #2b2520; border: 2px solid #4a3c31; padding: 8px 15px; margin-bottom: 10px; border-radius: 5px;">
                <div><span style="color: #a09080; font-size: 12px;">MOVES</span><br><strong id="movesText" style="color: #fff; font-size: 18px;">20</strong></div>
                <div><span style="color: #a09080; font-size: 12px;">TARGET</span><br><strong id="targetText" style="color: #d4af37; font-size: 18px;">500</strong></div>
                <div><span style="color: #a09080; font-size: 12px;">SCORE</span><br><strong id="scoreText" style="color: #d4af37; font-size: 18px;">0</strong></div>
            </div>
            <canvas id="gameCanvas" width="400" height="400" style="border: 4px solid #4a3c31; background-color: #2b2520; display: block; margin: 0 auto; border-radius: 4px;"></canvas>
        </div>

        <!-- LAB & AVATAR PANELS -->
        <div class="panel" style="background-color: #221c17; border: 2px solid #d4af37; border-radius: 8px; padding: 15px;">
            
            <!-- STABLE AVATAR BENCH -->
            <div style="background: radial-gradient(circle, #3a3025 0%, #1a1511 100%); border: 1px dashed #a09080; border-radius: 6px; padding: 10px; position: relative;">
                <div id="avatarMoodBubble" style="position: absolute; top: 8px; right: 8px; background-color: #d4af37; color: #1a1a1a; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: bold;">READY</div>
                
                <!-- Full Body Stack Frame -->
                <div id="avatarContainer" class="breathing">
                    <!-- Base Structure Stack Links -->
                    <div id="layerBody" class="avatar-layer"><span id="lblBase" style="color:#a09080; font-size:11px; margin-top:120px;">Androgynous</span></div>
                    <div id="layerOutfit" class="avatar-layer">👕</div>
                    <div id="layerFace" class="avatar-layer">😊</div>
                    <div id="layerHair" class="avatar-layer">🧑‍🦱</div>
                    
                    <!-- NOTE: When using your real graphics files later, change the layers above to this format: -->
                    <!-- <img id="layerBody" class="avatar-layer" src="assets/body_male.png" /> -->
                </div>
            </div>

            <!-- CUSTOMIZATION CONTROLS -->
            <h4 style="color: #d4af37; text-align: left; margin: 15px 0 8px 0; border-bottom: 1px solid #4a3c31; padding-bottom: 4px;">🧬 CHRONO-LAB STYLING BAY</h4>
            
            <!-- IDENTITY SELECTOR -->
            <p style="font-size: 11px; color: #a09080; text-align: left; margin: 4px 0;">CHOOSE BASE IDENTITY:</p>
            <div class="chip-group">
                <button onclick="changeIdentity('Male', '#243b55')" class="style-btn">Male Base</button>
                <button onclick="changeIdentity('Female', '#5b2445')" class="style-btn">Female Base</button>
                <button onclick="changeIdentity('Neutral', 'rgba(212,175,55,0.15)')" class="style-btn">Androgynous Base</button>
            </div>

            <!-- HAIR MENU -->
            <p style="font-size: 11px; color: #a09080; text-align: left; margin: 4px 0;">HAIR STYLE/HAIR EXTENSIONS:</p>
            <div class="chip-group">
                <button onclick="changeHair('🧑‍🦱')" class="style-btn">Curly</button>
                <button onclick="changeHair('👱')" class="style-btn">Blonde</button>
                <button onclick="changeHair('🧑‍🦰')" class="style-btn">Redhead</button>
                <button onclick="changeHair('🕺')" class="style-btn">Afro 🕶️</button>
            </div>

            <!-- WARDROBE DEPT -->
            <p style="font-size: 11px; color: #a09080; text-align: left; margin: 4px 0;">WARDROBE PIECES:</p>
            <button onclick="changeOutfit('👕')" class="outfit-row" style="background-color:#4a3c31; color:white; border-color:#d4af37; cursor:pointer;">🧍 Standard Time Suit</button>
            <button id="coatBtn" onclick="changeOutfit('🕵️‍♂️')" class="outfit-row" disabled>🔒 '40s Detective Trench Coat</button>
            <button id="jacketBtn" onclick="changeOutfit('🧥⚡')" class="outfit-row" disabled>🔒 '50s Greaser Leather Jacket</button>
            <button id="vestBtn" onclick="changeOutfit('🎽🌸')" class="outfit-row" disabled>🔒 '60s Hippie Fringe Vest</button>
            <button id="jumpsuitBtn" onclick="changeOutfit('🪩🕺')" class="outfit-row" disabled>🔒 '70s Disco Funk Jumpsuit</button>

        </div>
    </div>

    <script src="core-engine/logic.js"></script>
</body>
</html>
