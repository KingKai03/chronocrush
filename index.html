<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChronoCrush: The Era Odyssey</title>
    <style>
        /* Core Layout Reset */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #1a1a1a; color: #f0e6d2; font-family: sans-serif;
            margin: 0; padding: 20px; text-align: center; overflow-x: hidden;
        }

        /* Flex Grid System */
        #mainLayout {
            display: flex; justify-content: center; align-items: flex-start;
            gap: 30px; max-width: 950px; margin: 0 auto; flex-wrap: wrap;
        }
        .panel { max-width: 420px; width: 100%; }

        /* Game Board Canvas Viewport */
        #gameCanvas { 
            border: 4px solid #4a3c31; 
            box-shadow: 0px 10px 25px rgba(0,0,0,0.7); 
            display: block; 
            margin: 0 auto; 
            border-radius: 4px; 
            transform-origin: center;
        }

        /* Stable Avatar Framework Wrapper */
        #avatarContainer {
            position: relative; width: 160px; height: 260px; margin: 15px auto;
            transform-origin: bottom center;
        }

        .breathing { animation: avatarBreath 3.5s ease-in-out infinite; }
        @keyframes avatarBreath {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(1.02) translateY(-2px); }
            100% { transform: scaleY(1); }
        }

        /* Absolute Stack Alignment (Keeps head attached to body) */
        .avatar-layer {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* Fine-tuned Positioning for Individual Avatar Pieces */
        #layerBody { 
            background-color: rgba(212, 175, 55, 0.12); 
            border-radius: 40px 40px 15px 15px; 
            border: 2px dashed #d4af37; 
            transition: background-color 0.4s ease;
            z-index: 1;
        }
        #layerOutfit { font-size: 75px; z-index: 2; margin-top: 60px; }
        #layerFace { font-size: 60px; z-index: 3; margin-top: -120px; }
        #layerHair { font-size: 65px; z-index: 4; margin-top: -195px; }

        #lblBase {
            position: absolute;
            bottom: 15px;
            color: #d4af37; font-size: 11px; font-weight: bold; text-transform: uppercase;
            background: #221c17; padding: 2px 8px; border-radius: 4px; border: 1px solid #4a3c31;
        }

        /* Interactive Menu Custom UI Buttons */
        .chip-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .style-btn {
            background-color: #3a3025; color: #fff; border: 1px solid #5a4a3a;
            padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; min-height: 38px;
            transition: all 0.2s ease;
        }
        .style-btn:hover { border-color: #d4af37; background-color: #43372b; }
        
        .outfit-row {
            background-color: #332a22; color: #665544; border: 1px solid #44372c;
            padding: 12px; border-radius: 6px; text-align: left; margin-bottom: 8px;
            font-size: 14px; width: 100%; display: block; font-weight: bold;
            transition: all 0.3s ease;
        }

        /* Screen Scaling Fixes */
        @media (max-width: 768px) {
            body { padding: 10px; }
            #mainLayout { flex-direction: column; align-items: center; gap: 20px; }
            #gameCanvas { width: 92vw; height: 92vw; max-width: 380px; max-height: 380px; }
            .style-btn { padding: 12px 16px; font-size: 14px; flex-grow: 1; }
        }
    </style>
</head>
<body>

    <h1 style="color: #d4af37; letter-spacing: 2px; margin-bottom: 5px; margin-top: 5px;">ChronoCrush</h1>
    <h3 style="color: #a09080; margin-top: 0; font-weight: 300; margin-bottom: 15px;">The Era Odyssey</h3>

    <div id="mainLayout">
        
        <div class="panel">
            <p id="currentEraText" style="font-style: italic; color: #8a7a6a; margin-bottom: 10px; font-weight: bold; font-size: 18px;">Current Era: 1940s Noir</p>
            
            <div style="display: flex; justify-content: space-between; background-color: #2b2520; border: 2px solid #4a3c31; padding: 10px 20px; margin-bottom: 15px; border-radius: 5px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
                <div><span style="color: #a09080; font-size: 11px;">MOVES</span><br><strong id="movesText" style="color: #fff; font-size: 20px;">20</strong></div>
                <div><span style="color: #a09080; font-size: 11px;">TARGET</span><br><strong id="targetText" style="color: #d4af37; font-size: 20px;">500</strong></div>
                <div><span style="color: #a09080; font-size: 11px;">SCORE</span><br><strong id="scoreText" style="color: #d4af37; font-size: 20px;">0</strong></div>
            </div>
            
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div class="panel" style="background-color: #221c17; border: 2px solid #d4af37; border-radius: 8px; padding: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.5);">
            
            <div style="background: radial-gradient(circle, #3a3025 0%, #1a1511 100%); border: 2px dashed #a09080; border-radius: 6px; padding: 15px; position: relative; min-height: 290px; display: flex; align-items: center; justify-content: center;">
                <div id="avatarMoodBubble" style="position: absolute; top: 10px; right: 10px; background-color: #d4af37; color: #1a1a1a; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; letter-spacing: 1px;">READY</div>
                
                <div id="avatarContainer" class="breathing">
                    <div id="layerBody" class="avatar-layer">
                        <span id="lblBase">Androgynous</span>
                    </div>
                    <div id="layerOutfit" class="avatar-layer">👕</div>
                    <div id="layerFace" class="avatar-layer">😊</div>
                    <div id="layerHair" class="avatar-layer">🧑‍🦱</div>
                </div>
            </div>

            <h3 style="color: #d4af37; text-align: left; margin: 20px 0 10px 0; font-size: 16px; border-bottom: 1px solid #4a3c31; padding-bottom: 6px; letter-spacing: 1px;">🧬 CHRONO-LAB STYLING BAY</h3>
            
            <p style="font-size: 11px; color: #a09080; text-align: left; margin: 5px 0; font-weight: bold; letter-spacing: 0.5px;">CHOOSE BASE IDENTITY:</p>
            <div class="chip-group">
                <button onclick="changeIdentity('Male', 'rgba(36,59,85,0.4)')" class="style-btn">Male Base</button>
                <button onclick="changeIdentity('Female', 'rgba(91,36,69,0.4)')" class="style-btn">Female Base</button>
                <button onclick="changeIdentity('Neutral', 'rgba(212,175,55,0.12)')" class="style-btn">Androgynous Base</button>
            </div>

            <p style="font-size: 11px; color: #a09080; text-align: left; margin: 5px 0; font-weight: bold; letter-spacing: 0.5px;">HAIR STYLE / EXTENSIONS:</p>
            <div class="chip-group">
                <button onclick="changeHair('🧑‍🦱')" class="style-btn">Curly</button>
                <button onclick="changeHair('👱')" class="style-btn">Blonde</button>
                <button onclick="changeHair('🧑‍🦰')" class="style-btn">Redhead</button>
                <button onclick="changeHair('🕺')" class="style-btn">Afro 🕶️</button>
            </div>

            <p style="font-size: 11px; color: #a09080; text-align: left; margin: 5px 0; font-weight: bold; letter-spacing: 0.5px;">EQUIP OUTFITS & TIME REWARDS:</p>
            <div style="display: flex; flex-direction: column; gap: 2px;">
                <button onclick="changeOutfit('👕')" class="outfit-row" style="background-color: #4a3c31; color: white; border-color: #d4af37; cursor: pointer;">🧍 Standard Time Suit</button>
                <button id="coatBtn" onclick="changeOutfit('🕵️‍♂️')" class="outfit-row" disabled>🔒 '40s Detective Trench Coat</button>
                <button id="jacketBtn" onclick="changeOutfit('🧥⚡')" class="outfit-row" disabled>🔒 '50s Greaser Leather Jacket</button>
                <button id="vestBtn" onclick="changeOutfit('🎽🌸')" class="outfit-row" disabled>🔒 '60s Hippie Fringe Vest</button>
                <button id="jumpsuitBtn" onclick="changeOutfit('🪩🕺')" class="outfit-row" disabled>🔒 '70s Disco Funk Jumpsuit</button>
            </div>

        </div>
    </div>

    <script src="core-engine/logic.js"></script>
</body>
</html>
