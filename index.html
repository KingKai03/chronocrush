<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoCrush: The Era Odyssey</title>
</head>
<body style="background-color: #1a1a1a; color: #f0e6d2; font-family: sans-serif; text-align: center; margin: 0; padding: 20px;">

    <div id="game-container" style="margin: 20px auto; max-width: 450px;">
        <h1 style="color: #d4af37; letter-spacing: 2px; margin-bottom: 5px;">ChronoCrush</h1>
        <h3 style="color: #a09080; margin-top: 0; font-weight: 300;">The Era Odyssey</h3>
        
        <p id="currentEraText" style="font-style: italic; color: #8a7a6a; margin-bottom: 10px; font-weight: bold;">Current Era: 1940s Noir</p>
        
        <div style="display: flex; justify-content: space-between; background-color: #2b2520; border: 2px solid #4a3c31; padding: 10px 20px; margin-bottom: 15px; border-radius: 5px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
            <div><span style="color: #a09080;">MOVES:</span> <strong id="movesText" style="color: #fff; font-size: 20px;">20</strong></div>
            <div><span style="color: #a09080;">TARGET:</span> <strong id="targetText" style="color: #d4af37; font-size: 20px;">500</strong></div>
            <div><span style="color: #a09080;">SCORE:</span> <strong id="scoreText" style="color: #d4af37; font-size: 20px;">0</strong></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400" style="border: 4px solid #4a3c31; background-color: #2b2520; box-shadow: 0px 10px 25px rgba(0,0,0,0.7); display: block; margin: 0 auto;"></canvas>

        <div style="margin-top: 25px; background-color: #221c17; border: 2px dashed #d4af37; border-radius: 8px; padding: 15px; box-shadow: 0px 5px 15px rgba(0,0,0,0.5);">
            <h3 style="color: #d4af37; margin-top: 0; margin-bottom: 10px; letter-spacing: 1px; font-size: 16px;">⏱️ CHRONO-WARDROBE CLOSET</h3>
            
            <p style="font-size: 14px; color: #a09080; margin-bottom: 12px;">
                Your Current Look: <strong id="avatarEquipped" style="color: #fff; background-color: #3a3025; padding: 3px 8px; border-radius: 4px;">Standard Time-Traveler 🧍</strong>
            </p>
            
            <div style="display: flex; justify-content: center; gap: 15px;">
                <button id="coatBtn" onclick="equipItem('coat')" disabled style="background-color: #332a22; color: #665544; border: 2px solid #44372c; padding: 10px; border-radius: 6px; cursor: not-allowed; transition: all 0.3s;">
                    🔒 🧥<br><span style="font-size: 11px;">'40s Trench Coat</span>
                </button>
                
                <button id="jacketBtn" onclick="equipItem('jacket')" disabled style="background-color: #332a22; color: #665544; border: 2px solid #44372c; padding: 10px; border-radius: 6px; cursor: not-allowed; transition: all 0.3s;">
                    🔒 🧥⚡<br><span style="font-size: 11px;">'50s Leather Jacket</span>
                </button>
            </div>
        </div>
    </div>

    <script src="core-engine/logic.js"></script>
</body>
</html>
